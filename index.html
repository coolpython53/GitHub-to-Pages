<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GitHub Link Converter</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
      background: #0f172a;
      color: white;
    }

    select, input {
      width: 80%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #0ea5e9;
    }

    .output {
      margin-top: 20px;
      word-break: break-all;
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <h2>🔁 GitHub Link Converter</h2>

  <select id="mode">
    <option value="pages">🌐 Convert to GitHub Pages URL</option>
    <option value="raw">🔥 Convert to RAW URL</option>
  </select>

  <input id="inputUrl" placeholder="Paste GitHub blob URL here">
  <br>
  <button onclick="convert()">Convert 🚀</button>

  <div class="output" id="output">Result will appear here...</div>

  <script>
    function convert() {
      const url = document.getElementById("inputUrl").value.trim();
      const mode = document.getElementById("mode").value;

      try {
        const parsed = new URL(url);
        const parts = parsed.pathname.split("/");

        if (parts.length < 6 || parts[3] !== "blob") {
          throw new Error("Not a valid GitHub blob URL");
        }

        const user = parts[1];
        const repo = parts[2];
        const branch = parts[4];
        const filePath = parts.slice(5).join("/");

        let result = "";

        if (mode === "pages") {
          result = `https://${user}.github.io/${repo}/${filePath}`;
        }

        if (mode === "raw") {
          result = `https://raw.githubusercontent.com/${user}/${repo}/${branch}/${filePath}`;
        }

        document.getElementById("output").innerText = result;

      } catch (e) {
        document.getElementById("output").innerText =
          "❌ Invalid GitHub blob URL";
      }
    }
  </script>

</body>
</html>
