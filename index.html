<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GitHub → GitHub Pages Converter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
      background: #0f172a;
      color: white;
    }

    input {
      width: 80%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #0ea5e9;
    }

    .output {
      margin-top: 20px;
      word-break: break-all;
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <h2>🔁 GitHub → GitHub Pages Converter</h2>

  <input id="inputUrl" placeholder="Paste GitHub blob URL here">
  <br>
  <button onclick="convert()">Convert 🚀</button>

  <div class="output" id="output">Your converted link will appear here...</div>

  <script>
    function convert() {
      const url = document.getElementById("inputUrl").value.trim();

      try {
        const parsed = new URL(url);

        // Example path:
        // /coolpython53/prologue-assets/blob/main/wanderer/file.mp3
        const parts = parsed.pathname.split("/");

        if (parts.length < 5 || parts[3] !== "blob") {
          throw new Error("Not a valid GitHub blob URL");
        }

        const user = parts[1];
        const repo = parts[2];

        // remove: /user/repo/blob/branch
        const filePath = parts.slice(5).join("/");

        const pagesUrl = `https://${user}.github.io/${repo}/${filePath}`;

        document.getElementById("output").innerText = pagesUrl;

      } catch (e) {
        document.getElementById("output").innerText =
          "❌ Invalid GitHub blob URL";
      }
    }
  </script>

</body>
</html>
